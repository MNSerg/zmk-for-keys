# Recovery / diagnostic build matrix
#
# If stock Corne also shows nothing after power-cycle, the MCU is not
# running apps (bootloader OK, application path broken or PCB short).
#
# Test procedure:
#   A) Remove nice!nano from the Corne PCB, disconnect battery
#   B) Flash tester_pro_micro.uf2 — should appear as "ZMK Tester" keyboard
#   C) If A+B fail → reflash Adafruit bootloader (see PR / agent notes)
#   D) If tester works off-board but fails on-board → short on Corne PCB
---
include:
  - board: nice_nano@2.0.0//zmk
    shield: settings_reset
    artifact-name: settings_reset

  # Upstream pin tester: USB HID only, BLE off, no split/I2C/OLED
  - board: nice_nano@2.0.0//zmk
    shield: tester_pro_micro
    artifact-name: tester_pro_micro

  - board: nice_nano@1.0.0//zmk
    shield: tester_pro_micro
    artifact-name: tester_pro_micro_v1

  - board: nice_nano@2.0.0//zmk
    shield: corne_left
    artifact-name: stock_corne_left

  - board: nice_nano@2.0.0//zmk
    shield: corne_v3_left_bare
    artifact-name: corne_v3_left_bare

  - board: nice_nano@2.0.0//zmk
    shield: corne_v3_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: corne_v3_left

  - board: nice_nano@2.0.0//zmk
    shield: corne_v3_right
    artifact-name: corne_v3_right

  # Right without trackball — isolate matrix (pair with left_bare + settings_reset)
  - board: nice_nano@2.0.0//zmk
    shield: corne_v3_right_bare
    artifact-name: corne_v3_right_bare

  # Left without Studio/OLED — if right keys work only with this, Studio settings on left are the culprit
  - board: nice_nano@2.0.0//zmk
    shield: corne_v3_left
    cmake-args: -DCONFIG_ZMK_STUDIO=n
    artifact-name: corne_v3_left_nostudio
