# GitHub Actions build matrix for Corne v3 (nice!nano v2)
#
# corne_left       — full: OLED + RGB + pointing + USB/BLE (no Studio)
# corne_left_basic — bring-up: keys + USB/BLE only (no OLED/RGB/Studio)
# corne_right      — PAT912x trackball peripheral
# settings_reset   — clear bonds / settings
---
include:
  - board: nice_nano@2.0.0//zmk
    shield: corne_left
    artifact-name: corne_left
  - board: nice_nano@2.0.0//zmk
    shield: corne_left
    cmake-args: -DCONFIG_ZMK_DISPLAY=n -DCONFIG_ZMK_RGB_UNDERGLOW=n -DCONFIG_ZMK_STUDIO=n
    artifact-name: corne_left_basic
  - board: nice_nano@2.0.0//zmk
    shield: corne_right
    artifact-name: corne_right
  - board: nice_nano@2.0.0//zmk
    shield: settings_reset
    artifact-name: settings_reset
