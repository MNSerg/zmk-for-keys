# GitHub Actions build matrix for Corne v3 (nice!nano v2)
# Left: OLED SSD1306 + central (USB+BLE) + ZMK Studio
# Right: PAT912x trackball peripheral
# Also builds settings_reset for clearing bonds
---
include:
  - board: nice_nano@2.0.0//zmk
    shield: corne_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: corne_left
  - board: nice_nano@2.0.0//zmk
    shield: corne_right
    artifact-name: corne_right
  - board: nice_nano@2.0.0//zmk
    shield: settings_reset
    artifact-name: settings_reset
