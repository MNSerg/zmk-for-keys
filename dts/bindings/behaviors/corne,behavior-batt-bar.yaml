description: |
  Briefly show this half's battery level as a green bar on the Corne
  middle per-key LED row (indices fixed in batt_bar.c from foostan/QMK map).

compatible: "corne,behavior-batt-bar"

include: zero_param.yaml

properties:
  hold-ms:
    type: int
    default: 2500
    description: How long to keep the bar visible.
