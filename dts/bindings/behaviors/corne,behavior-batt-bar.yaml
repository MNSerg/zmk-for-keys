description: |
  Briefly show this half's battery level as a green bar on selected
  per-key LEDs (Corne middle row by default).

compatible: "corne,behavior-batt-bar"

include: zero_param.yaml

properties:
  led-map:
    type: array
    default: [25, 22, 19, 16, 11, 8]
    description: |
      0-based LED indices for the bar, left→right on the half
      (Corne middle row SW7–SW12 / mirrored right). From foostan/QMK
      wiring: not a contiguous index range.

  hold-ms:
    type: int
    default: 2500
    description: How long to keep the bar visible.
