description: |
  PAT9125EL trackball with software polling.
  MOTION GPIO is not used (often stuck low on modules).
  Probes I2C addresses 0x75 / 0x73 / 0x79 (ID_SEL Low / High / NC).

compatible: "corne,pat912x-poll"

include: i2c-device.yaml

properties:
  poll-interval-ms:
    type: int
    default: 8
    description: How often to read delta registers over I2C.

  zephyr,axis-x:
    type: int

  zephyr,axis-y:
    type: int

  res-x-cpi:
    type: int
    default: 1000

  res-y-cpi:
    type: int
    default: 1000

  invert-x:
    type: boolean

  invert-y:
    type: boolean

  ignore-product-id:
    type: boolean
    description: Continue if product id is not 0x3191.
