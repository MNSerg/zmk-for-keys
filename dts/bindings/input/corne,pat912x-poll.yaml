description: |
  PAT9125EL trackball with Prusa/PixArt full init + software polling.
  MOTION GPIO is not used.

compatible: "corne,pat912x-poll"

include: i2c-device.yaml

properties:
  poll-interval-ms:
    type: int
    default: 5

  zephyr,axis-x:
    type: int

  zephyr,axis-y:
    type: int

  res-x:
    type: int
    default: 0xbc
    description: Raw RES_X register (0xBC ≈ 1000 CPI).

  res-y:
    type: int
    default: 0xbc
    description: Raw RES_Y register (0xBC ≈ 1000 CPI).

  invert-x:
    type: boolean

  invert-y:
    type: boolean

  ignore-product-id:
    type: boolean
