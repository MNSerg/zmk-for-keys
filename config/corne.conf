# Shared config for both halves
# Debounce (pinout DEBOUNCE_MS = 20)
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=20
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=20

# BLE radio power for more reliable split link
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Keyboard name
CONFIG_ZMK_KEYBOARD_NAME="Corne"

# Windows battery report workaround
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

# Idle blanking only — deep sleep disabled for bring-up reliability
CONFIG_ZMK_IDLE_TIMEOUT=600000
CONFIG_ZMK_SLEEP=n

# USB + BLE
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# Pointing / mouse HID
CONFIG_ZMK_POINTING=y

# RGB underglow (WS2812 SPI driver auto-enabled via DT)
# Keep EXT_POWER independent so RGB toggle does not cut OLED VCC
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=60
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
