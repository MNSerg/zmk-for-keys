# Right: RGB + PAT912x pointing (OLED off by default — see corne_v3_right_oled)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=60
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# OLED disabled here. To enable SSD1306 on the same I2C as the trackball:
#   build.yaml → shield: corne_v3_right corne_v3_right_oled
CONFIG_ZMK_DISPLAY=n
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y
CONFIG_INPUT_GPIO_KEYS=n
CONFIG_INPUT_THREAD_STACK_SIZE=2048
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_ZMK_STUDIO=n
# Avoid runtime PM suspending PAT912x between motion IRQs
CONFIG_PM_DEVICE_RUNTIME=n
