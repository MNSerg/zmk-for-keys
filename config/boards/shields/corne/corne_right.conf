# RGB underglow (6 underglow + 21 per-key)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# No OLED on right half — PAT912x trackball instead
CONFIG_ZMK_DISPLAY=n

# Pointing / PAT912x (native Zephyr input driver)
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y
CONFIG_I2C=y
CONFIG_GPIO=y
