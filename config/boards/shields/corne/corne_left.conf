# RGB underglow (6 underglow + 21 per-key; WS2812 via DT)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# OLED SSD1306 128x32 on left half
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Pointing (receives trackball via BLE split)
CONFIG_ZMK_POINTING=y

# No ZMK Studio in the default image (Studio USB CDC was a likely boot/USB failure mode)
CONFIG_ZMK_STUDIO=n
